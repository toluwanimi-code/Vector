<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vector - Career Navigation System</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <section id="landing">
      <h1>Vector</h1>
      <p class="tagline">Know where you stand. Know what's next.</p>
      <p class="description">
        Vector analyzes your learning activity, projects, and real-world output
        to diagnose your current career stage and tell you exactly what to do
        next.
      </p>
      <button id="start-btn">Start Assessment</button>
    </section>

    <section id="assessment">
      <p id="progress">Question 1 of 10</p>
      <div id="question container"></div>
      <button id="back-btn">Back</button>
      <button id="next-btn">Next</button>
      <button id="submit-btn">Submit</button>
    </section>

    <section id="results">
      <h2 id="stage-name"></h2>
      <p id="explanation"></p>
      <ul id="reality-check"></ul>
      <p id="reality-check"></p>
      <button id="retake-btn">Retake Assessment</button>
    </section>

    <script src="script.js"></script>
  </body>
</html>
